<html>
<head>
  <title>Farming Notes App</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        background-color: #f8f9fa;
        border-bottom: 1px solid #e9ecef;
        transition: all 0.3s ease; /* Add transition for interactive effects */
    }
    .navbar:hover {
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Subtle shadow on hover */
        background-color: #f0f0f0; /* Slightly darker background on hover */
    }
    .navbar-brand {
        font-size: 1.5em;
        font-weight: bold;
        color: #2c3e50;
        text-decoration: none;
    }
    .nav-links {
        display: flex;
        gap: 15px;
        align-items: center;
    }
    .nav-links a {
        text-decoration: none;
        color: #3498db;
        font-weight: 500;
    }
    .nav-links a:hover {
        color: #2980b9;
    }
    .notification-icon-container {
        position: relative;
        cursor: pointer;
    }
    .notification-icon {
        font-size: 1.8em;
        color: #34495e;
    }
    .notification-badge {
        position: absolute;
        top: -5px;
        right: -10px;
        background-color: #e74c3c;
        color: white;
        border-radius: 50%;
        padding: 3px 7px;
        font-size: 0.7em;
        font-weight: bold;
        display: none; /* Hidden by default */
    }
    .notifications-dropdown {
        position: absolute;
        top: 40px; /* Adjust as needed */
        right: 0;
        background-color: white;
        border: 1px solid #e9ecef;
        border-radius: 8px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        width: 350px;
        max-height: 400px;
        overflow-y: auto;
        z-index: 1000;
        display: none; /* Hidden by default */
    }
    .notifications-dropdown.active {
        display: block;
    }
    .dropdown-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 15px;
        border-bottom: 1px solid #e9ecef;
    }
    .dropdown-header h4 {
        margin: 0;
        font-size: 1.1em;
        color: #2c3e50;
    }
    .mark-all-read-btn {
        background-color: #3498db;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.85em;
    }
    .mark-all-read-btn:hover {
        background-color: #2980b9;
    }
    #notification-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    #notification-list li {
        padding: 12px 15px;
        border-bottom: 1px solid #f8f9fa;
        cursor: pointer;
        transition: background-color 0.2s ease;
        display: flex;
        align-items: flex-start;
    }
    #notification-list li:last-child {
        border-bottom: none;
    }
    #notification-list li:hover {
        background-color: #f2f2f2;
    }
    #notification-list li.unread {
        background-color: #e8f0fe;
    }
    #notification-list li.unread:hover {
        background-color: #d0e1ff;
    }
    .notification-content {
        flex-grow: 1;
    }
    .notification-message {
        font-size: 0.95em;
        color: #34495e;
        margin-bottom: 5px;
    }
    .notification-time {
        font-size: 0.8em;
        color: #7f8c8d;
    }
    .notification-type-icon {
        font-size: 1.2em;
        margin-right: 10px;
        flex-shrink: 0;
    }
    .dropdown-footer {
        padding: 10px 15px;
        border-top: 1px solid #e9ecef;
        text-align: center;
    }
    .dropdown-footer a {
        color: #3498db;
        text-decoration: none;
        font-size: 0.9em;
    }
    .dropdown-footer a:hover {
        text-decoration: underline;
    }
    .no-notifications {
        padding: 20px;
        text-align: center;
        color: #7f8c8d;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="{{ url_for('home') }}" class="navbar-brand">Farm Manager</a>
    <div class="nav-links">
      {% if session.get('user_id') %}
      <div class="notification-icon-container">
        <span class="notification-icon">🔔</span>
        <span class="notification-badge" id="notification-badge">0</span>
        <div class="notifications-dropdown" id="notifications-dropdown">
          <div class="dropdown-header">
            <h4>Notifications</h4>
            <button class="mark-all-read-btn" id="mark-all-read-btn">Mark all as read</button>
          </div>
          <ul id="notification-list"></ul>
          <div class="dropdown-footer">
            <a href="{{ url_for('notifications_page') }}">View all notifications</a>
          </div>
        </div>
      </div>
      <a href="{{ url_for('logout') }}">Logout</a>
      {% endif %}
    </div>
  </div>
  {% with messages = get_flashed_messages() %}
    {% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}
  {% endwith %}
  {% block content %}{% endblock %}

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const notificationIconContainer = document.querySelector('.notification-icon-container');
      const notificationsDropdown = document.getElementById('notifications-dropdown');
      const notificationList = document.getElementById('notification-list');
      const notificationBadge = document.getElementById('notification-badge');
      const markAllReadBtn = document.getElementById('mark-all-read-btn');

      let notifications = [];

      // Function to fetch notifications from the backend
      async function fetchNotifications() {
        try {
          const response = await fetch('/notifications');
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const data = await response.json();
          notifications = data;
          renderNotifications();
          updateUnreadCount();
        } catch (error) {
          console.error('Error fetching notifications:', error);
        }
      }

      // Function to render notifications in the dropdown
      function renderNotifications() {
        notificationList.innerHTML = ''; // Clear existing notifications

        if (notifications.length === 0) {
          notificationList.innerHTML = '<li class="no-notifications">No new notifications</li>';
          return;
        }

        notifications.forEach(notif => {
          const listItem = document.createElement('li');
          listItem.dataset.id = notif.id;
          listItem.classList.add('notification-item');
          if (!notif.is_read) {
            listItem.classList.add('unread');
          }

          let icon = '';
          switch (notif.type) {
            case 'weather': icon = '🌦️'; break;
            case 'alert': icon = '🚨'; break;
            case 'farming': icon = '🌾'; break;
            default: icon = '💬';
          }

          listItem.innerHTML = `
            <span class="notification-type-icon">${icon}</span>
            <div class="notification-content">
              <div class="notification-message">${notif.message}</div>
              <div class="notification-time">${new Date(notif.created_at).toLocaleString()}</div>
            </div>
          `;
          listItem.addEventListener('click', () => markNotificationAsRead(notif.id, listItem));
          notificationList.appendChild(listItem);
        });
      }

      // Function to update the unread count badge
      function updateUnreadCount() {
        const unreadCount = notifications.filter(notif => !notif.is_read).length;
        if (unreadCount > 0) {
          notificationBadge.textContent = unreadCount;
          notificationBadge.style.display = 'block';
        } else {
          notificationBadge.style.display = 'none';
        }
      }

      // Function to mark a single notification as read
      async function markNotificationAsRead(notificationId, listItem) {
        try {
          const response = await fetch(`/notifications/mark_read/${notificationId}`, {
            method: 'POST'
          });
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const data = await response.json();
          if (data.success) {
            // Update the notification in the local array
            const index = notifications.findIndex(notif => notif.id === notificationId);
            if (index !== -1) {
              notifications[index].is_read = true;
            }
            listItem.classList.remove('unread');
            updateUnreadCount();
            // Optionally close dropdown or redirect to a notification detail page
            // For now, just mark as read visually
          }
        } catch (error) {
          console.error('Error marking notification as read:', error);
        }
      }

      // Function to mark all notifications as read
      markAllReadBtn.addEventListener('click', async function() {
        try {
          const response = await fetch('/notifications/mark_all_read', {
            method: 'POST'
          });
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const data = await response.json();
          if (data.success) {
            notifications.forEach(notif => notif.is_read = true);
            renderNotifications();
            updateUnreadCount();
          }
        } catch (error) {
          console.error('Error marking all notifications as read:', error);
        }
      });

      // Toggle notifications dropdown
      notificationIconContainer.addEventListener('click', function(event) {
        notificationsDropdown.classList.toggle('active');
        if (notificationsDropdown.classList.contains('active')) {
          fetchNotifications(); // Fetch fresh notifications when opening
        }
        event.stopPropagation(); // Prevent document click from closing immediately
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', function(event) {
        if (!notificationIconContainer.contains(event.target) && notificationsDropdown.classList.contains('active')) {
          notificationsDropdown.classList.remove('active');
        }
      });

      // Initial fetch of notifications
      fetchNotifications();

      // Refresh notifications every 60 seconds (adjust as needed)
      setInterval(fetchNotifications, 60000);

    });
  </script>
</body>
</html>
