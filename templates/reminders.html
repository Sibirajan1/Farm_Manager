{% extends "base.html" %}
{% block content %}
<div class="container">
  <div class="content">
    <div class="navigation-section top-left-nav">
      <a href="{{ url_for('home') }}" class="btn btn-info back-btn">
        <span class="btn-icon">🏠</span>
        Back to Dashboard
      </a>
    </div>

    <!-- Header Section -->
    <div class="hero-section">
      <h2>⏰ Set a New Reminder</h2>
      <p>Never miss an important farm activity again!</p>
    </div>

    <!-- Reminder Creation Form -->
    <div class="create-reminder-section">
      <div class="action-card">
        <h3>✨ Create Reminder</h3>
        <p>Enter the details for your new reminder</p>
        <form method="post" action="{{ url_for('set_reminder') }}" id="createReminderForm">
          <div class="input-group">
            <input type="text" name="topic" placeholder="Reminder Topic (e.g., Plant Corn, Check Irrigation)" required>
          </div>
          <div class="input-group" style="margin-top: 15px;">
            <input type="date" name="reminder_date" required>
          </div>
          <button type="submit" class="btn btn-success create-btn" style="margin-top: 20px;">
            <span class="btn-icon">➕</span>
            Set Reminder
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Custom Styles for Reminders Page (similar to notes for consistency) -->
<style>
  .create-reminder-section {
    margin-bottom: 40px;
  }

  .input-group {
    display: flex;
    gap: 15px;
    align-items: center;
    flex-wrap: wrap;
  }

  .input-group input[type="text"],
  .input-group input[type="date"] {
    flex: 1;
    min-width: 300px;
    margin: 0;
    padding: 12px 18px;
    border: 1px solid #ced4da;
    border-radius: 8px;
    font-size: 1em;
    color: #495057;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .input-group input[type="text"]:focus,
  .input-group input[type="date"]:focus {
    border-color: #80bdff;
    box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
    outline: none;
  }

  .create-btn {
    white-space: nowrap;
    min-width: 180px;
  }

  .navigation-section {
    text-align: center;
    margin-top: 50px;
    padding-top: 30px;
    border-top: 2px solid #e9ecef;
  }

  .back-btn {
    font-size: 16px;
    padding: 12px 30px;
  }

  .top-left-nav {
    text-align: left;
    margin-top: 0;
    padding-top: 0;
    border-top: none;
    margin-bottom: 20px;
  }

  .top-left-nav .back-btn {
    font-size: 14px;
    padding: 8px 15px;
  }

  @media (max-width: 768px) {
    .input-group {
      flex-direction: column;
      align-items: stretch;
    }

    .input-group input {
      min-width: unset;
    }
  }
</style>

{% endblock %}
